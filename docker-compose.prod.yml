services:
  web:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - backend

  api:
    restart: unless-stopped

volumes:
  certbot_webroot:
